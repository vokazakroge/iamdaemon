name: Deploy All Sites to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать деплой вручную из интерфейса GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🚀 Starting deploy of all sites..."
            
            cd /var/www
            
            # Pull latest code from GitHub
            git pull origin main
            
            echo "📦 Fixing permissions..."
            
            # Fix ownership for ALL files
            chown -R www-data .
            
            # Fix permissions for code files
            find . -type f \( -name "*.php" -o -name "*.html" -o -name "*.htm" \) -exec chmod 644 {} +
            find . -type f \( -name "*.css" -o -name "*.js" -o -name "*.json" \) -exec chmod 644 {} +
            find . -type d -exec chmod 755 {} +
            
            # Special permissions for data folders (where DBs are)
            if [ -d "reg.iamdaemon.tech/data" ]; then
                chmod 775 reg.iamdaemon.tech/data
                chmod 664 reg.iamdaemon.tech/data/.gitkeep 2>/dev/null || true
            fi
            
            # Permissions for user subdomains folder
            if [ -d "users" ]; then
                chmod -R 775 users
            fi
            
            echo "🔄 Reloading services..."
            
            # Reload web server and PHP
            systemctl reload nginx
            systemctl reload php8.3-fpm
            
            echo "✅ Deploy complete! All sites updated."